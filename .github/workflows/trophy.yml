name: Generate GitHub Trophy

on:
  schedule:
    - cron: "0 1 * * 0"   # 每周日 01:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate trophy SVG
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: NuoHui
          output_path: output/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate trophy SVG
        run: |
          test -s output/trophy.svg
          grep -q "<svg" output/trophy.svg
          if grep -qi "Unexpected error" output/trophy.svg; then
            echo "::error::Generated trophy SVG contains an error message"
            cat output/trophy.svg
            exit 1
          fi

      - name: Commit and push trophy SVG
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update trophy svg [skip ci]"
          file_pattern: output/trophy.svg

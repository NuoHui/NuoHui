name: Generate GitHub Trophy

on:
  schedule:
    - cron: "0 1 * * 0"   # 每周日 01:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate trophy via metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: NuoHui
          # 只启用 achievements 插件，输出极简卡片
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_ignored: ""
          config_output: svg
          # metrics 默认输出到仓库根目录，filename 只写文件名
          filename: output/trophy.svg
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_branch: master
          committer_message: "chore: update trophy svg [skip ci]"

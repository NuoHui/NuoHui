<svg xmlns="http://www.w3.org/2000/svg" width="920" height="150" viewBox="0 0 920 150" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Trophies</title>
  <desc id="desc">Fallback trophy board for NuoHui. It will be refreshed by GitHub Actions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <style>
      .title { font: 700 22px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; fill: #e5e7eb; }
      .sub { font: 500 12px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; fill: #94a3b8; }
      .label { font: 700 14px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; fill: #e5e7eb; }
      .value { font: 700 20px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; fill: #facc15; }
    </style>
  </defs>
  <rect width="920" height="150" rx="18" fill="url(#bg)"/>
  <text x="28" y="36" class="title">GitHub Trophy Board</text>
  <text x="28" y="58" class="sub">A stable local fallback. Auto-refreshes via GitHub Actions after workflow runs.</text>

  <g filter="url(#shadow)">
    <g transform="translate(28 78)">
      <rect width="130" height="52" rx="12" fill="#111827" stroke="#334155"/>
      <circle cx="26" cy="26" r="13" fill="url(#gold)"/>
      <text x="50" y="23" class="label">Stars</text>
      <text x="50" y="43" class="value">Ready</text>
    </g>
    <g transform="translate(172 78)">
      <rect width="130" height="52" rx="12" fill="#111827" stroke="#334155"/>
      <circle cx="26" cy="26" r="13" fill="url(#gold)"/>
      <text x="50" y="23" class="label">Commits</text>
      <text x="50" y="43" class="value">Ready</text>
    </g>
    <g transform="translate(316 78)">
      <rect width="130" height="52" rx="12" fill="#111827" stroke="#334155"/>
      <circle cx="26" cy="26" r="13" fill="url(#gold)"/>
      <text x="50" y="23" class="label">Repos</text>
      <text x="50" y="43" class="value">Ready</text>
    </g>
    <g transform="translate(460 78)">
      <rect width="130" height="52" rx="12" fill="#111827" stroke="#334155"/>
      <circle cx="26" cy="26" r="13" fill="url(#gold)"/>
      <text x="50" y="23" class="label">Followers</text>
      <text x="50" y="43" class="value">Ready</text>
    </g>
    <g transform="translate(604 78)">
      <rect width="130" height="52" rx="12" fill="#111827" stroke="#334155"/>
      <circle cx="26" cy="26" r="13" fill="url(#gold)"/>
      <text x="50" y="23" class="label">Pullers</text>
      <text x="50" y="43" class="value">Ready</text>
    </g>
    <g transform="translate(748 78)">
      <rect width="144" height="52" rx="12" fill="#111827" stroke="#334155"/>
      <circle cx="26" cy="26" r="13" fill="url(#gold)"/>
      <text x="50" y="23" class="label">Reviews</text>
      <text x="50" y="43" class="value">Ready</text>
    </g>
  </g>
</svg>
